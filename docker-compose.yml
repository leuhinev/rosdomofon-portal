version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: portal
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  memcached:
    image: memcached:1.6
    ports:
      - "11211:11211"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - memcached
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml

volumes:
  mysql_data: